<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Lock by Relaxabit</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --grid-bg: #141724;
            --text-color: #ffffff;
            --gold: #ffd700;
            --danger: #ff4757;
            /* Neon Themes */
            --neon-blue: #00f2fe;
            --neon-purple: #4facfe;
            --theme-glow: 0 0 10px #00f2fe, 0 0 20px #4facfe;
            --frame-border: 4px solid #1e2235;
            --tile-base: #1e2235;
        }

        /* Spring Equinox Earth New Year Theme */
        .theme-spring {
            --neon-blue: #39ff14;
            --neon-purple: #00ff87;
            --theme-glow: 0 0 12px #39ff14, 0 0 25px #00ff87;
            --frame-border: 4px dashed #39ff14;
        }

        /* Spooky Halloween Theme */
        .theme-halloween {
            --neon-blue: #ff6700;
            --neon-purple: #9400d3;
            --theme-glow: 0 0 12px #ff6700, 0 0 25px #9400d3;
            --frame-border: 4px double #ff6700;
        }

        /* Winter Solstice Theme */
        .theme-winter {
            --neon-blue: #00ffffff;
            --neon-purple: #ff007f;
            --theme-glow: 0 0 12px #00ffffff, 0 0 25px #ff007f;
            --frame-border: 4px solid #00ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header-controls {
            width: 100%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        select, .btn-help {
            background: #1e2235;
            color: white;
            border: 1px solid var(--neon-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .marketplace-btn {
            background: linear-gradient(135deg, #ff9f43, #ff6b6b);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(255, 159, 67, 0.4);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            color: var(--neon-blue);
            text-shadow: var(--theme-glow);
            margin: 5px 0 15px 0;
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 380px;
        }

        .stat-box {
            flex: 1;
            background: rgba(30, 34, 53, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
        }

        /* Difficulty Toggle Bar */
        .diff-container {
            display: flex;
            background: #1e2235;
            padding: 4px;
            border-radius: 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .diff-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #888;
            padding: 8px 0;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .diff-btn.active {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white;
            box-shadow: var(--theme-glow);
        }

        /* Outer Frame Layout */
        .board-frame {
            border: var(--frame-border);
            box-shadow: var(--theme-glow);
            padding: 12px;
            border-radius: 20px;
            background: rgba(15, 17, 26, 0.8);
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        #board {
            display: grid;
            background-color: var(--grid-bg);
            padding: 12px;
            border-radius: 14px;
            gap: 12px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* 💎 PREMIUM 3D METALLIC BEVEL TILE STYLING 💎 */
        .tile {
            position: relative;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%),
                linear-gradient(to bottom, #2d334d, #161924);
            border: 1px solid #3b4263;
            /* Creates the internal beveled facet shadows mimicking image_14 */
            box-shadow: 
                inset 0 4px 5px rgba(255,255,255,0.2), 
                inset 0 -4px 5px rgba(0,0,0,0.5),
                inset 4px 0 5px rgba(255,255,255,0.05),
                inset -4px 0 5px rgba(0,0,0,0.5),
                0 6px 10px rgba(0, 0, 0, 0.5);
            color: #b0b7db;
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s, box-shadow 0.2s, color 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Diagonal Bevel lines simulation */
        .tile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 5px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        /* Active click squeeze effect */
        .tile:active {
            transform: scale(0.95);
            box-shadow: 
                inset 0 2px 3px rgba(0,0,0,0.6),
                0 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* Correctly Solved Position - Explodes with crystal neon color matching theme */
        .tile.correct-pos {
            color: #ffffff;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0) 60%),
                linear-gradient(to bottom, var(--neon-blue), var(--neon-purple));
            border-color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(255,255,255,0.8), 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.4),
                inset 0 -4px 6px rgba(0,0,0,0.4),
                0 0 15px var(--neon-blue);
        }

        .tile.empty {
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            cursor: default;
        }
        
        .tile.empty::before { display: none; }

        .scramble-btn {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: var(--theme-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Overlay Modals for How to Play & Game Over */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 17, 26, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #1e2235;
            border: 2px solid var(--neon-blue);
            box-shadow: var(--theme-glow);
            padding: 25px;
            border-radius: 20px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px; color: #888; cursor: pointer;
        }

        .example-table {
            width: 120px; margin: 15px auto;
            border-collapse: collapse;
        }
        .example-table td {
            border: 1px solid rgba(255,255,255,0.2);
            width: 35px; height: 35px; text-align: center;
            font-weight: bold; font-size: 14px;
        }
        .td-empty { background: rgba(255,255,255,0.05); border-style: dashed !important; }
    </style>
</head>
<body class="theme-winter">

    <div class="header-controls">
        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option value="theme-winter">❄️ Winter</option>
            <option value="theme-spring">🌸 Earth NY</option>
            <option value="theme-halloween">🎃 Halloween</option>
        </select>
        <button class="btn-help" onclick="toggleModal('rulesModal', true)">How to Play ❓</button>
    </div>

    <button class="marketplace-btn">🛒 Marketplace</button>
    <h1>Grid Lock</h1>

    <div class="stats-container">
        <div class="stat-box" id="moveBox">Moves: <span id="moveCount">20</span> / <span id="maxMoves">20</span></div>
        <div class="stat-box">🔥 Streak: <span id="streakCount">0</span> Days</div>
    </div>

    <!-- Difficulty Toggles -->
    <div class="diff-container">
        <button class="diff-btn" id="diff3" onclick="setDifficulty(3)">Easy (3x3)</button>
        <button class="diff-btn active" id="diff4" onclick="setDifficulty(4)">Mid (4x4)</button>
        <button class="diff-btn" id="diff5" onclick="setDifficulty(5)">Hard (5x5)</button>
    </div>

    <!-- Outer Frame for Seasonal Highlights -->
    <div class="board-frame" id="frame">
        <div id="board"></div>
    </div>

    <button class="scramble-btn" onclick="scrambleBoard()">Scramble Board</button>

    <!-- Modal: Rules Box -->
    <div id="rulesModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="toggleModal('rulesModal', false)">&times;</span>
            <h3 style="color:var(--neon-blue); margin-top:0;">How To Play</h3>
            <p style="font-size:14px; line-height:1.5; color:#ccc;">Slide tiles into adjacent empty spaces. Arrange all numbers into ascending order from top-left to win!</p>
            
            <div style="display:flex; justify-content:center; gap:20px; align-items:center;">
                <div>
                    <span style="font-size:11px; color:#888;">Slide 1 Down</span>
                    <table class="example-table">
                        <tr><td>3</td><td class="td-empty"></td></tr>
                        <tr><td>2</td><td>1</td></tr>
                    </table>
                </div>
                <div style="font-size:20px; color:var(--neon-blue);">➔</div>
                <div>
                    <span style="font-size:11px; color:#888;">Solved Grid</span>
                    <table class="example-table" style="border: 1px solid var(--neon-blue);">
                        <tr><td>1</td><td>2</td></tr>
                        <tr><td>3</td><td class="td-empty"></td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Grandma Alert / Game Status -->
    <div id="statusModal" class="modal">
        <div class="modal-content">
            <h3 id="statusTitle" style="margin-top:0; font-size:24px;"></h3>
            <p id="statusMessage" style="font-size:15px; line-height:1.6; color:#eee; margin:15px 0;"></p>
            <button class="scramble-btn" onclick="closeStatusAndReset()">Try Again</button>
        </div>
    </div>

    <script {nonce-placeholder}>
        let size = 4; 
        let board = [];
        let movesLeft = 20;
        let totalMovesAllowed = 20;
        let streak = 0;

        const roasts = [
            "I’ve seen tectonic plates move faster than your brain cells right now. Try again, sweetie. 👵💥",
            "Bless your heart, but your strategy is dryer than my Sunday pot roast. Scramble it and try again! 🍲❌",
            "Twenty moves and you couldn't even sort a single row? I raised your parents better than this. 🙄💨",
            "Are your eyes locked or is the grid locked? Because that layout is an absolute mess! 🔍👀",
            "Even with my bifocals, I can see a hundred better moves than the ones you just made. 👓🔥"
        ];

        if(localStorage.getItem('gridLockStreak')) {
            streak = parseInt(localStorage.getItem('gridLockStreak'));
            document.getElementById('streakCount').innerText = streak;
        }

        function changeTheme(themeName) {
            document.body.className = themeName;
        }

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        function setDifficulty(newSize) {
            size = newSize;
            totalMovesAllowed = size === 3 ? 15 : (size === 4 ? 20 : 35);
            
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('diff' + size).classList.add('active');
            
            scrambleBoard();
        }

        function initBoard() {
            board = [];
            let totalTiles = size * size;
            for (let i = 1; i < totalTiles; i++) board.push(i);
            board.push(0);
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            boardEl.innerHTML = '';

            let tileSize = size === 3 ? '85px' : (size === 4 ? '68px' : '54px');

            board.forEach((val, index) => {
                const tile = document.createElement('div');
                tile.style.width = tileSize;
                tile.style.height = tileSize;
                
                if (val === 0) {
                    tile.className = 'tile empty';
                } else {
                    tile.className = 'tile';
                    tile.innerText = val;
                    
                    if (val === index + 1) {
                        tile.classList.add('correct-pos');
                    }

                    tile.onclick = () => moveTile(index);
                }
                boardEl.appendChild(tile);
            });

            document.getElementById('moveCount').innerText = movesLeft;
            document.getElementById('maxMoves').innerText = totalMovesAllowed;
        }

        function moveTile(index) {
            if (movesLeft <= 0) return;

            const emptyIndex = board.indexOf(0);
            const row = Math.floor(index / size);
            const col = index % size;
            const empRow = Math.floor(emptyIndex / size);
            const empCol = emptyIndex % size;

            const isAdjacent = (Math.abs(row - empRow) + Math.abs(col - empCol)) === 1;

            if (isAdjacent) {
                board[emptyIndex] = board[index];
                board[index] = 0;
                movesLeft--;
                
                renderBoard();
                checkGameStatus();
            }
        }

        function scrambleBoard() {
            initBoard();
            movesLeft = totalMovesAllowed;
            
            for (let i = board.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [board[i], board[j]] = [board[j], board[i]];
            }
            
            if (board.indexOf(0) === -1) board[board.length - 1] = 0;
            
            renderBoard();
        }

        function checkGameStatus() {
            let isWin = true;
            for (let i = 0; i < board.length - 1; i++) {
                if (board[i] !== i + 1) { isWin = false; break; }
            }

            if (isWin && board[board.length - 1] === 0) {
                streak++;
                localStorage.setItem('gridLockStreak', streak);
                document.getElementById('streakCount').innerText = streak;
                
                document.getElementById('statusTitle').innerText = "✨ AURA UNLOCKED! ✨";
                document.getElementById('statusTitle').style.color = "var(--neon-blue)";
                document.getElementById('statusMessage').innerText = "Incredible pathing! An energy pulse surges across your grid circuit. You saved yourself from a roasting today!";
                toggleModal('statusModal', true);
            } 
            else if (movesLeft === 0) {
                streak = 0;
                localStorage.setItem('gridLockStreak', 0);
                document.getElementById('streakCount').innerText = 0;

                let randomRoast = roasts[Math.floor(Math.random() * roasts.length)];
                
                document.getElementById('statusTitle').innerText = "👵 Grandma Says:";
                document.getElementById('statusTitle').style.color = "var(--danger)";
                document.getElementById('statusMessage').innerText = randomRoast;
                toggleModal('statusModal', true);
            }
        }

        function closeStatusAndReset() {
            toggleModal('statusModal', false);
            scrambleBoard();
        }

        scrambleBoard();
    </script>
</body>
</html>
